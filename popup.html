<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Data Importer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="papaparse.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>DGCA Importer</h1>
            <p>Upload your CSV file to populate Logbook.</p>
        </header>

        <main>
            <form id="uploadForm" class="upload-card">
                <div class="file-drop-area" id="dropArea">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <span class="file-msg">Choose a CSV file</span>
                    <span class="file-name" id="fileName">No file selected</span>
                    <input type="file" id="csvFile" name="csvFile" accept=".csv" required>
                </div>

                <div class="checkbox-container">
                    <input type="checkbox" id="autoAddCheckbox">
                    <label for="autoAddCheckbox">Automatically click Add button</label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn" disabled>
                    Upload and Process
                </button>
            </form>

            <div id="statusMessage" class="status-message hidden"></div>
        </main>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
